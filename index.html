<html lang="uk"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ibonarium — Місячна Лабораторія</title>
  <meta name="description" content="Ibonarium Moon Lab — Реальна телеметрія Місяця в реальному часі.">
  <meta property="og:title" content="Ibonarium Moon Lab — Телеметрія Місяця">
  <meta property="og:description" content="Реальні дані Місяця: фаза, освітленість, відстань, температура, позиція.">
  <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;text y='.9em' font-size='90'&gt;🌙&lt;/text&gt;&lt;/svg&gt;">
  <style>

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    @keyframes twinkle {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.7; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseSlow {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    body {
      background: #000;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Roboto', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Starfield */
    .starfield { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
    .star { position: absolute; border-radius: 50%; background: #fff; will-change: opacity; }

    /* Layout */
    .page { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .header {
      width: 100%; padding: 2rem 1.5rem 1rem;
      display: flex; flex-direction: column; align-items: center; text-align: center; gap: 0.5rem;
      animation: fadeIn 1.2s ease-out;
    }
    .header .mission { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(150,170,220,0.6); }
    .header h1 { font-size: clamp(2rem, 6vw, 3.75rem); font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #fff; line-height: 1.1; }
    .header .subtitle { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(150,170,220,0.5); }
    .header .clock { font-size: 13px; font-family: 'Courier New', monospace; letter-spacing: 0.1em; color: rgba(150,170,220,0.7); margin-top: 0.25rem; }
    .header .live { display: flex; align-items: center; gap: 6px; }
    .header .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; animation: pulseSlow 2s ease-in-out infinite; }
    .header .live-text { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(150,170,220,0.4); }

    /* Content */
    .content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 0 1rem 2rem; }

    /* Moon image */
    .moon-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; margin: 1rem 0 1.5rem; animation: fadeIn 1.8s ease-out; }
    .moon-img-container { display: flex; justify-content: center; align-items: center; }
    .moon-img-container img, .moon-img-container svg { border-radius: 50%; filter: drop-shadow(0 0 40px rgba(180,180,200,0.06)); transition: width 0.4s ease, height 0.4s ease; }
    .moon-zoom { display: flex; align-items: center; gap: 12px; }
    .moon-zoom button {
      background: rgba(150,170,220,0.06); border: 1px solid rgba(150,170,220,0.1); color: rgba(150,170,220,0.5);
      font-size: 16px; font-family: 'Courier New', monospace; width: 32px; height: 32px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease;
      line-height: 1; padding: 0;
    }
    .moon-zoom button:hover { background: rgba(150,170,220,0.12); border-color: rgba(150,170,220,0.25); color: rgba(150,170,220,0.8); }
    .moon-zoom .zoom-level { font-size: 9px; font-family: 'Courier New', monospace; letter-spacing: 0.15em; color: rgba(150,170,220,0.3); min-width: 40px; text-align: center; }

    /* Phase label */
    .phase-label { text-align: center; margin-bottom: 2rem; animation: fadeIn 2.2s ease-out; }
    .phase-label .name { font-size: clamp(1rem, 2.5vw, 1.25rem); letter-spacing: 0.3em; text-transform: uppercase; font-weight: 300; color: #fff; }
    .phase-label .illum { font-size: 12px; font-family: 'Courier New', monospace; margin-top: 4px; letter-spacing: 0.1em; color: rgba(150,170,220,0.5); }
    .progress-bar { margin: 0.75rem auto 0; width: 200px; height: 1px; background: rgba(150,170,220,0.1); position: relative; }
    .progress-bar .fill { position: absolute; top: 0; left: 0; height: 100%; background: linear-gradient(to right, rgba(150,170,220,0.05), rgba(150,170,220,0.5)); transition: width 1s ease; }
    .progress-labels { display: flex; justify-content: space-between; margin: 4px auto 0; width: 200px; }
    .progress-labels span { font-size: 7px; letter-spacing: 0.1em; color: rgba(150,170,220,0.2); }

    /* Data grid */
    .data-grid {
      width: 100%; max-width: 48rem;
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem 2rem;
      animation: fadeIn 2.6s ease-out;
    }
    @media (min-width: 640px) { .data-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 1024px) { .data-grid { grid-template-columns: repeat(4, 1fr); } }
    .data-item { display: flex; flex-direction: column; gap: 2px; }
    .data-item .label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 500; color: rgba(150,170,220,0.35); }
    .data-item .value { font-size: 14px; font-family: 'Courier New', monospace; letter-spacing: 0.05em; color: rgba(220,225,235,0.85); }

    /* Calendar */
    .calendar { width: 100%; max-width: 56rem; margin-top: 3rem; animation: fadeIn 3s ease-out; }
    .calendar-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .calendar-header span { font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(150,170,220,0.3); }
    .calendar-header .line { flex: 1; height: 1px; background: rgba(150,170,220,0.06); }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    @media (min-width: 640px) { .calendar-grid { grid-template-columns: repeat(10, 1fr); } }
    @media (min-width: 768px) { .calendar-grid { grid-template-columns: repeat(14, 1fr); } }
    @media (min-width: 1024px) { .calendar-grid { grid-template-columns: repeat(15, 1fr); } }
    .cal-day { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 2px; border-radius: 6px; }
    .cal-day.today { background: rgba(150,170,220,0.06); }
    .cal-day .day-num { font-size: 8px; font-family: 'Courier New', monospace; }
    .cal-day .day-num.is-today { color: rgba(150,170,220,0.8); font-weight: 600; }
    .cal-day .day-num:not(.is-today) { color: rgba(150,170,220,0.2); }
    .cal-day .day-pct { font-size: 7px; font-family: 'Courier New', monospace; color: rgba(150,170,220,0.15); }

    /* Footer */
    .footer {
      margin-top: auto; padding: 1.25rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer span { font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; }
    .footer .left { color: rgba(150,170,220,0.15); }
    .footer .right { color: rgba(150,170,220,0.12); }

    /* Loading */
    .loading { min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; }
    .spinner { width: 48px; height: 48px; border-radius: 50%; border: 2px solid rgba(150,170,220,0.2); border-top-color: rgba(150,170,220,0.6); animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(150,170,220,0.6); font-family: 'Courier New', monospace; }
  
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loading" class="loading" style="display: none;">
    <div class="spinner"></div>
    <p class="loading-text">Синхронізація даних Місяця...</p>
  </div>

  <!-- Page -->
  <div id="app" class="page" style="display: none;">
    <div id="starfield" class="starfield"></div>

    <!-- Header -->
    <div class="header">
      <span class="mission">Місія: Lunar-X1-Sync</span>
      <h1>Ibonarium</h1>
      <span class="subtitle">Місячна Лабораторія — Телеметрія в Реальному Часі</span>
      <span id="clock" class="clock">--:--:-- UTC</span>
      <div class="live">
        <span class="live-dot"></span>
        <span class="live-text">Наживо</span>
      </div>
    </div>

    <!-- Content -->
    <div class="content">
      <!-- Moon -->
      <div class="moon-wrap">
        <div class="moon-img-container" id="moonContainer"></div>
        <div class="moon-zoom">
          <button id="zoomOut" title="Зменшити">−</button>
          <span class="zoom-level" id="zoomLevel">1.0×</span>
          <button id="zoomIn" title="Збільшити">+</button>
        </div>
      </div>

      <!-- Phase label -->
      <div class="phase-label">
        <p class="name" id="phaseName">—</p>
        <p class="illum" id="illumLabel">—</p>
        <div class="progress-bar"><div class="fill" id="progressFill" style="width: 0%;"></div></div>
        <div class="progress-labels"><span>НМ</span><span>ПЧ</span><span>ПМ</span><span>ОЧ</span></div>
      </div>

      <!-- Data grid -->
      <div class="data-grid" id="dataGrid"></div>

      <!-- Calendar -->
      <div class="calendar">
        <div class="calendar-header">
          <span>Щомісячний Огляд</span>
          <div class="line"></div>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span class="left">Ibonarium Moon Lab © 2025</span>
      <span class="right">NASA SVS Dial-A-Moon API + Алгоритм Міуса (fallback)</span>
    </div>
  </div>

<script>
// ═══════════════════════════════════════════════════════════
// ASTRONOMICAL CALCULATIONS — Jean Meeus, "Astronomical Algorithms"
// ═══════════════════════════════════════════════════════════
var SYN = 29.53058867;
var KNOWN_NM = new Date('2000-01-06T18:14:00Z').getTime();

function moonAge(now) {
  return ((now.getTime() - KNOWN_NM) / 86400000) % SYN;
}

function phaseFromAge(age) { return age / SYN; }

function illum(phase) { return (1 - Math.cos(phase * 2 * Math.PI)) / 2; }

function phaseName(age) {
  if (age < 1.85) return 'Новий Місяць';
  if (age < 5.55) return 'Зростаючий Серп';
  if (age < 9.25) return 'Перша Чверть';
  if (age < 12.95) return 'Зростаючий Опуклий';
  if (age < 16.65) return 'Повний Місяць';
  if (age < 20.35) return 'Спадаючий Опуклий';
  if (age < 24.05) return 'Остання Чверть';
  if (age < 27.75) return 'Спадаючий Серп';
  return 'Новий Місяць';
}

function moonDist(now) {
  var T = (now.getTime() - new Date('2000-01-01T12:00:00Z').getTime()) / 86400000;
  var M = (13.1763966 + 0.9856473 * T) % 360;
  return Math.round(384400 * (1 - 0.0549 * 0.0549) / (1 + 0.0549 * Math.cos(M * Math.PI / 180)));
}

function moonPos(now) {
  var T = (now.getTime() - new Date('2000-01-01T12:00:00Z').getTime()) / 86400000;
  var L0 = (218.3165 + 13.176396 * T) % 360;
  var M = (134.9634 + 13.064993 * T) % 360;
  var F = (93.2721 + 13.229350 * T) % 360;
  var lon = L0 + 6.289 * Math.sin(M * Math.PI / 180);
  var lat = 5.128 * Math.sin(F * Math.PI / 180);
  var lr = lon * Math.PI / 180, la = lat * Math.PI / 180, ob = 23.4393 * Math.PI / 180;
  var ra = Math.atan2(Math.sin(lr) * Math.cos(ob) - Math.tan(la) * Math.sin(ob), Math.cos(lr));
  var dec = Math.asin(Math.sin(la) * Math.cos(ob) + Math.cos(la) * Math.sin(ob) * Math.sin(lr));
  var rh = ((ra * 180 / Math.PI) / 15 + 24) % 24;
  var rH = Math.floor(rh), rM = Math.floor((rh - rH) * 60), rS = Math.floor(((rh - rH) * 60 - rM) * 60);
  var dd = dec * 180 / Math.PI, dD = Math.floor(Math.abs(dd)), dM = Math.floor((Math.abs(dd) - dD) * 60);
  return { ra: rH + 'h ' + rM + 'm ' + rS + 's', dec: (dd >= 0 ? '+' : '-') + dD + '\u00B0 ' + dM + "'" };
}

function libration(now) {
  var T = (now.getTime() - new Date('2000-01-01T12:00:00Z').getTime()) / 86400000;
  return {
    lon: Math.round((-1.25 + 6.49 * Math.sin((134.9634 + 13.064993 * T) * Math.PI / 180)) * 10) / 10,
    lat: Math.round((4.88 - 4.37 * Math.sin((93.2721 + 13.229350 * T) * Math.PI / 180)) * 10) / 10
  };
}

function surfTemp(ip) {
  return { day: Math.round(120 + ip * 0.9), night: Math.round(-180 + ip * 0.57) };
}

function nextEvents(now, age) {
  var addD = function(d) { var dt = new Date(now); dt.setDate(dt.getDate() + Math.floor(d)); return dt.toISOString().split('T')[0]; };
  return {
    fm: addD((SYN / 2 - age + SYN) % SYN),
    nm: addD(SYN - age),
    fq: addD((SYN / 4 - age + SYN) % SYN),
    lq: addD((3 * SYN / 4 - age + SYN) % SYN)
  };
}

function monthlyCalendar(now) {
  var y = now.getFullYear(), m = now.getMonth(), days = new Date(y, m + 1, 0).getDate();
  var cal = [];
  for (var d = 1; d <= days; d++) {
    var dt = new Date(y, m, d, 12, 0, 0);
    var a = moonAge(dt), p = phaseFromAge(a);
    cal.push({ date: y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0'), age: a, phase: p, illum: illum(p) });
  }
  return cal;
}

// ═══════════════════════════════════════════════════════════
// SVG MOON — always works, zero dependencies
// ═══════════════════════════════════════════════════════════
function moonSVG(phase, illumination) {
  var wax = phase <= 0.5, pa = phase * 2 * Math.PI, t = Math.cos(pa);
  var sz = 300, r = sz / 2, ex = Math.abs(t) * r;
  var lp;
  if (wax) { lp = illumination < 0.5
    ? 'M ' + r + ' 0 A ' + ex + ' ' + r + ' 0 0 1 ' + r + ' ' + sz + ' A ' + r + ' ' + r + ' 0 0 0 ' + r + ' 0'
    : 'M ' + r + ' 0 A ' + r + ' ' + r + ' 0 0 1 ' + r + ' ' + sz + ' A ' + ex + ' ' + r + ' 0 0 1 ' + r + ' 0';
  } else { lp = illumination < 0.5
    ? 'M ' + r + ' 0 A ' + ex + ' ' + r + ' 0 0 0 ' + r + ' ' + sz + ' A ' + r + ' ' + r + ' 0 0 1 ' + r + ' 0'
    : 'M ' + r + ' 0 A ' + r + ' ' + r + ' 0 0 0 ' + r + ' ' + sz + ' A ' + ex + ' ' + r + ' 0 0 0 ' + r + ' 0';
  }
  var craters = [
    [30,25,8,0.15],[55,35,12,0.12],[40,55,6,0.18],[65,50,10,0.1],[25,60,7,0.14],
    [50,70,9,0.13],[70,25,5,0.16],[35,42,4,0.2],[60,65,11,0.11],[45,30,3,0.17],
    [55,58,5,0.15],[28,45,6,0.12],[42,78,8,0.1],[72,42,7,0.13],[33,15,4,0.09],[58,18,6,0.11]
  ];
  var mare = [[0.35,0.45,0.12,0.08,0.2],[0.55,0.38,0.18,0.1,0.15],[0.45,0.62,0.15,0.09,0.18],[0.62,0.55,0.1,0.07,0.12],[0.38,0.32,0.08,0.06,0.14]];
  var mareSvg = mare.map(function(m) { return '<ellipse cx="' + (m[0]*sz) + '" cy="' + (m[1]*sz) + '" rx="' + (m[2]*sz) + '" ry="' + (m[3]*sz) + '" fill="rgba(50,48,40,' + m[4] + ')"/>'; }).join('');
  var cratersSvg = craters.map(function(c) { return '<circle cx="' + (c[0]/100*sz) + '" cy="' + (c[1]/100*sz) + '" r="' + (c[2]/100*sz) + '" fill="rgba(70,65,55,' + c[3] + ')"/>'; }).join('');
  return '<svg width="' + sz + '" height="' + sz + '" viewBox="0 0 ' + sz + ' ' + sz + '">' +
    '<defs>' +
      '<filter id="mt"><feTurbulence type="fractalNoise" baseFrequency="0.03 0.04" numOctaves="5" seed="42" result="n"/>' +
      '<feColorMatrix type="saturate" values="0" in="n" result="gn"/><feBlend in="SourceGraphic" in2="gn" mode="multiply"/></filter>' +
      '<radialGradient id="mg" cx="38%" cy="38%" r="55%"><stop offset="0%" stopColor="#e8e4d4"/><stop offset="20%" stopColor="#d4d0c0"/>' +
      '<stop offset="45%" stopColor="#b8b4a4"/><stop offset="70%" stopColor="#9a9686"/><stop offset="90%" stopColor="#7a7670"/><stop offset="100%" stopColor="#5a5650"/></radialGradient>' +
      '<radialGradient id="dg" cx="55%" cy="55%" r="50%"><stop offset="0%" stopColor="#1a1a2e"/><stop offset="100%" stopColor="#08080f"/></radialGradient>' +
      '<clipPath id="mc"><circle cx="' + r + '" cy="' + r + '" r="' + r + '"/></clipPath>' +
    '</defs>' +
    '<circle cx="' + r + '" cy="' + r + '" r="' + r + '" fill="url(#dg)"/>' +
    '<g clip-path="url(#mc)" filter="url(#mt)">' +
      '<path d="' + lp + '" fill="url(#mg)"/>' +
      mareSvg + cratersSvg +
    '</g>' +
    '<circle cx="' + r + '" cy="' + r + '" r="' + r + '" fill="none" stroke="rgba(140,140,160,0.08)" stroke-width="1.5"/>' +
  '</svg>';
}

// Mini moon for calendar
function miniMoonSVG(phase, illumination) {
  var wax = phase <= 0.5, t = Math.cos(phase * 2 * Math.PI), sz = 20, r = 10, ex = Math.abs(t) * r;
  var lp;
  if (wax) { lp = illumination < 0.5 ? 'M 10 0 A ' + ex + ' 10 0 0 1 10 20 A 10 10 0 0 0 10 0' : 'M 10 0 A 10 10 0 0 1 10 20 A ' + ex + ' 10 0 0 1 10 0'; }
  else { lp = illumination < 0.5 ? 'M 10 0 A ' + ex + ' 10 0 0 0 10 20 A 10 10 0 0 1 10 0' : 'M 10 0 A 10 10 0 0 0 10 20 A ' + ex + ' 10 0 0 0 10 0'; }
  var cid = 'c' + phase.toFixed(4).replace('.','');
  return '<svg width="' + sz + '" height="' + sz + '" viewBox="0 0 ' + sz + ' ' + sz + '"><circle cx="10" cy="10" r="9.5" fill="#0a0a14"/><clipPath id="' + cid + '"><circle cx="10" cy="10" r="9.5"/></clipPath><g clip-path="url(#' + cid + ')"><path d="' + lp + '" fill="rgba(200,200,210,0.7)"/></g></svg>';
}

// ═══════════════════════════════════════════════════════════
// STARFIELD — opacity-only twinkle, NO scale
// ═══════════════════════════════════════════════════════════
var _starsCreated = false;
function createStars() {
  if (_starsCreated) return;
  _starsCreated = true;
  var sf = document.getElementById('starfield');
  if (!sf) return;
  sf.innerHTML = '';
  for (var i = 0; i < 200; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    var size = Math.random() * 1.2 + 0.4;
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    s.style.opacity = String(Math.random() * 0.5 + 0.15);
    s.style.animation = 'twinkle ' + (4 + Math.random() * 6) + 's ease-in-out ' + (Math.random() * 5) + 's infinite';
    sf.appendChild(s);
  }
}

// ═══════════════════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════════════════
function updateClock() {
  var now = new Date();
  var h = String(now.getUTCHours()).padStart(2, '0');
  var m = String(now.getUTCMinutes()).padStart(2, '0');
  var s = String(now.getUTCSeconds()).padStart(2, '0');
  var el = document.getElementById('clock');
  if (el) el.textContent = h + ':' + m + ':' + s + ' UTC';
}

// ═══════════════════════════════════════════════════════════
// MOON RENDERER
// ═══════════════════════════════════════════════════════════
function renderSVG(phase, il, size) {
  var container = document.getElementById('moonContainer');
  if (!container) return;
  container.innerHTML = '';
  var wrapper = document.createElement('div');
  wrapper.innerHTML = moonSVG(phase, il);
  var svg = wrapper.firstChild;
  svg.setAttribute('width', size);
  svg.setAttribute('height', size);
  container.appendChild(svg);
}

function loadNASAImage(url, size) {
  return new Promise(function(resolve, reject) {
    var container = document.getElementById('moonContainer');
    if (!container) { reject(new Error('no container')); return; }
    var img = new Image();
    var done = false;
    img.onload = function() {
      if (done) return; done = true;
      container.innerHTML = '';
      img.width = size;
      img.height = size;
      img.alt = 'NASA Moon';
      img.style.cssText = 'object-fit:cover;border-radius:50%;';
      container.appendChild(img);
      resolve(true);
    };
    img.onerror = function() { if (!done) { done = true; reject(new Error('img fail')); } };
    img.referrerPolicy = 'no-referrer';
    img.src = url;
    setTimeout(function() { if (!done) { done = true; reject(new Error('timeout')); } }, 10000);
  });
}

// ═══════════════════════════════════════════════════════════
// NASA DIAL-A-MOON API (best-effort, CORS proxies)
// ═══════════════════════════════════════════════════════════
async function fetchNASADialAMoon(now) {
  var y = now.getUTCFullYear();
  var mo = String(now.getUTCMonth() + 1).padStart(2, '0');
  var d = String(now.getUTCDate()).padStart(2, '0');
  var h = String(now.getUTCHours()).padStart(2, '0');
  var apiUrl = 'https://svs.gsfc.nasa.gov/api/dialamoon/' + y + '-' + mo + '-' + d + 'T' + h + ':00';

  var urls = [
    apiUrl,
    'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(apiUrl),
    'https://corsproxy.io/?' + encodeURIComponent(apiUrl),
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(apiUrl)
  ];

  for (var i = 0; i < urls.length; i++) {
    try {
      var res = await fetch(urls[i], { signal: AbortSignal.timeout(4000) });
      if (!res.ok) continue;
      var data = await res.json();
      if (!data || !data.image || !data.image.url) continue;

      var raDeg = data.j2000_ra || 0;
      var raH = Math.floor(raDeg / 15);
      var raM = Math.floor((raDeg / 15 - raH) * 60);
      var raS = Math.floor(((raDeg / 15 - raH) * 60 - raM) * 60);

      var decDeg = data.j2000_dec || 0;
      var decD = Math.floor(Math.abs(decDeg));
      var decM = Math.floor((Math.abs(decDeg) - decD) * 60);

      return {
        imageUrl: data.image.url,
        phase: data.phase,
        age: data.age,
        diameter: data.diameter,
        distance: data.distance,
        ra: raH + 'h ' + raM + 'm ' + raS + 's',
        dec: (decDeg >= 0 ? '+' : '-') + decD + '\u00B0 ' + decM + "'",
        libLon: data.subearth_lon,
        libLat: data.subearth_lat,
        source: 'NASA Dial-A-Moon API'
      };
    } catch (e) { /* try next */ }
  }
  return null;
}

// Compute NASA image URL directly (fallback if API fails)
function computeNASAUrl(now) {
  try {
    var y = now.getUTCFullYear();
    var jan1 = new Date(Date.UTC(y, 0, 1));
    var dayOfYear = Math.floor((now.getTime() - jan1.getTime()) / 86400000) + 1;
    var hour = now.getUTCHours();
    var frame = (dayOfYear - 1) * 24 + hour + 1;
    var yearMap = [
      { year: 2024, parent: 'a005000', vis: 'a005048' },
      { year: 2025, parent: 'a005500', vis: 'a005550' },
      { year: 2026, parent: 'a005500', vis: 'a005587' },
      { year: 2027, parent: 'a005500', vis: 'a005600' }
    ];
    var entry = yearMap.find(function(e) { return e.year === y; }) || yearMap[yearMap.length - 1];
    return 'https://svs.gsfc.nasa.gov/vis/a000000/' + entry.parent + '/' + entry.vis + '/frames/730x730_1x1_30p/moon.' + String(frame).padStart(4, '0') + '.jpg';
  } catch (e) { return ''; }
}

// ═══════════════════════════════════════════════════════════
// BUILD DATA ROWS
// ═══════════════════════════════════════════════════════════
function buildDataRows(age, il, dist, vel, ang, pos, lib, temp, mr, ms, ev, nasa) {
  var ageH = Math.floor(age);
  var ageRem = (age - ageH) * 24;
  var ageG = Math.floor(ageRem);
  var ageX = Math.floor((ageRem - ageG) * 60);

  function fmtDate(ds) {
    try { return new Date(ds + 'T00:00:00').toLocaleDateString('uk-UA', { month: 'short', day: 'numeric' }); }
    catch (e) { return ds; }
  }
  function fmtTime(iso) {
    if (!iso) return '\u2014';
    try { return new Date(iso).toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Europe/Kiev' }); }
    catch (e) { return '\u2014'; }
  }

  var useDist = (nasa && nasa.distance) ? Math.round(nasa.distance) : dist;
  var useDiam = (nasa && nasa.diameter) ? (nasa.diameter / 60).toFixed(1) : ang;
  var useVel = Math.round(2 * Math.PI * useDist / (SYN * 86400) * 100) / 100;
  var useRA = (nasa && nasa.ra) ? nasa.ra : pos.ra;
  var useDec = (nasa && nasa.dec) ? nasa.dec : pos.dec;
  var useLibLon = (nasa && nasa.libLon != null) ? Math.round(nasa.libLon * 10) / 10 : lib.lon;
  var useLibLat = (nasa && nasa.libLat != null) ? Math.round(nasa.libLat * 10) / 10 : lib.lat;

  return [
    ['\u0424\u0410\u0417\u0410', phaseName(age)],
    ['\u0412\u0406\u041A', ageH + '\u0434 ' + ageG + '\u0433 ' + ageX + '\u0445\u0432'],
    ['\u041E\u0421\u0412\u0406\u0422\u041B\u0415\u041D\u0406\u0421\u0422\u042C', (Math.round(il * 10000) / 100) + '%'],
    ['\u0412\u0406\u0414\u0421\u0422\u0410\u041D\u042C', useDist.toLocaleString() + ' \u043A\u043C'],
    ['\u0428\u0412\u0418\u0414\u041A\u0406\u0421\u0422\u042C', useVel + ' \u043A\u043C/\u0441'],
    ['\u041A\u0423\u0422\u041E\u0412\u0418\u0419 \u0420\u041E\u0417\u041C\u0406\u0420', useDiam + "'"],
    ['\u041F\u0420\u042F\u041C\u0415 \u0421\u0425\u0418\u0414\u0416\u0415\u041D\u041D\u042F', useRA],
    ['\u0421\u0425\u0418\u041B\u0415\u041D\u041D\u042F', useDec],
    ['\u041B\u0406\u0411\u0420\u0410\u0426\u0406\u042F', useLibLon + '\u00B0 / ' + useLibLat + '\u00B0'],
    ['\u0422\u0415\u041C\u041F. \u0414\u0415\u041D\u041D\u041E\u0447\u0406', temp.day + '\u00B0C'],
    ['\u0422\u0415\u041C\u041F. \u041D\u0406\u0427\u041D\u041E\u0447\u0406', temp.night + '\u00B0C'],
    ['\u041C\u0406\u0421\u042F\u0426\u0415\u0421\u0425\u0406\u0414', fmtTime(mr)],
    ['\u041C\u0406\u0421\u042F\u0426\u0415\u0417\u0410\u0425\u0406\u0414', fmtTime(ms)],
    ['\u041D\u0410\u0421\u0422\u0423\u041F\u041D\u0418\u0419 \u041F\u041E\u0412\u041D\u0418\u0419', fmtDate(ev.fm)],
    ['\u041D\u0410\u0421\u0422\u0423\u041F\u041D\u0418\u0419 \u041D\u041E\u0412\u0418\u0419', fmtDate(ev.nm)],
    ['\u0421\u0418\u041D\u041E\u0414. \u041F\u0415\u0420\u0406\u041E\u0414', SYN.toFixed(2) + ' \u0434\u043D'],
    ['\u0426\u0418\u041A\u041B', ((age / SYN) * 100).toFixed(1) + '%']
  ];
}

function renderDataGrid(rows) {
  document.getElementById('dataGrid').innerHTML = rows.map(function(r) {
    return '<div class="data-item"><span class="label">' + r[0] + '</span><span class="value">' + r[1] + '</span></div>';
  }).join('');
}

function renderCalendar(cal, todayDate) {
  document.getElementById('calendarGrid').innerHTML = cal.map(function(d) {
    var dn = parseInt(d.date.split('-')[2]);
    var isT = dn === todayDate;
    return '<div class="cal-day' + (isT ? ' today' : '') + '">' +
      '<span class="day-num' + (isT ? ' is-today' : '') + '">' + dn + '</span>' +
      miniMoonSVG(d.phase, d.illum) +
      '<span class="day-pct">' + (d.illum > 0 ? Math.round(d.illum * 100) : '0') + '</span>' +
    '</div>';
  }).join('');
}

function updatePhaseLabel(age, il) {
  var prog = (age / SYN) * 100;
  document.getElementById('phaseName').textContent = phaseName(age);
  document.getElementById('illumLabel').textContent = '\u041E\u0441\u0432\u0456\u0442\u043B\u0435\u043D\u0456\u0441\u0442\u044C ' + (Math.round(il * 10000) / 100) + '%';
  document.getElementById('progressFill').style.width = prog.toFixed(1) + '%';
}

// ═══════════════════════════════════════════════════════════
// MAIN INIT — shows content IMMEDIATELY, NASA in background
// ═══════════════════════════════════════════════════════════
async function init() {
  var now = new Date();

  // Step 1: Meeus calculations (instant, no network needed)
  var age = moonAge(now), phase = phaseFromAge(age), il = illum(phase);
  var dist = moonDist(now), pos = moonPos(now), lib = libration(now);
  var ev = nextEvents(now, age), cal = monthlyCalendar(now);
  var temp = surfTemp(il * 100);
  var vel = Math.round(2 * Math.PI * dist / (SYN * 86400) * 100) / 100;
  var ang = Math.round(2 * 1737.4 / dist * 180 / Math.PI * 60 * 100) / 100;

  // Step 2: SVG moon immediately (guaranteed)
  var baseSize = 300;
  window._moonScale = window._moonScale || 1;
  var displaySize = Math.round(baseSize * window._moonScale);
  renderSVG(phase, il, displaySize);

  // Step 3: Show ALL data immediately with Meeus values
  var rows = buildDataRows(age, il, dist, vel, ang, pos, lib, temp, null, null, ev, null);
  updatePhaseLabel(age, il);
  renderDataGrid(rows);
  renderCalendar(cal, now.getDate());

  // Step 4: Show page immediately
  createStars();
  updateClock();
  setInterval(updateClock, 1000);
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  // Zoom controls
  document.getElementById('zoomLevel').textContent = window._moonScale.toFixed(1) + '\u00D7';
  document.getElementById('zoomIn').onclick = function() {
    if (window._moonScale < 3) {
      window._moonScale = Math.round((window._moonScale + 0.2) * 10) / 10;
      var sz = Math.round(300 * window._moonScale);
      document.getElementById('zoomLevel').textContent = window._moonScale.toFixed(1) + '\u00D7';
      renderSVG(window._currentPhase || phase, window._currentIllum || il, sz);
    }
  };
  document.getElementById('zoomOut').onclick = function() {
    if (window._moonScale > 0.4) {
      window._moonScale = Math.round((window._moonScale - 0.2) * 10) / 10;
      var sz = Math.round(300 * window._moonScale);
      document.getElementById('zoomLevel').textContent = window._moonScale.toFixed(1) + '\u00D7';
      renderSVG(window._currentPhase || phase, window._currentIllum || il, sz);
    }
  };

  window._currentPhase = phase;
  window._currentIllum = il;
  window._currentNasa = null;

  if (!window._refreshTimer) {
    window._refreshTimer = setInterval(function() { refreshData(); }, 60000);
  }

  // Step 5: Load NASA photo IMMEDIATELY (direct URL, no CORS needed)
  var nasaImageUrl = computeNASAUrl(now);
  if (nasaImageUrl) {
    try { await loadNASAImage(nasaImageUrl, displaySize); } catch (e) {}
  }

  // Step 6: Background tasks (non-blocking, page already shows NASA photo or SVG)
  var nasa = null;
  var mr = null, ms = null;

  // NASA API for telemetry (distance, RA/DEC, libration from NASA)
  try { nasa = await fetchNASADialAMoon(now); } catch (e) {}

  // Moonrise/moonset
  try {
    var res = await fetch('https://api.sunrise-sunset.org/json?lat=50.45&lng=30.52&formatted=0&date=today');
    var data = await res.json();
    if (data.status === 'OK') { mr = data.results.moonrise; ms = data.results.moonset; }
  } catch (e) {}

  // Step 7: Update data grid with NASA telemetry + moonrise/moonset if available
  if (nasa || mr || ms) {
    var updatedRows = buildDataRows(age, il, dist, vel, ang, pos, lib, temp, mr, ms, ev, nasa);
    renderDataGrid(updatedRows);
    if (nasa) window._currentNasa = nasa;
  }
}

// ═══════════════════════════════════════════════════════════
// PERIODIC REFRESH (every 60s, no layout reset)
// ═══════════════════════════════════════════════════════════
async function refreshData() {
  var now = new Date();
  var age = moonAge(now), phase = phaseFromAge(age), il = illum(phase);
  var dist = moonDist(now), pos = moonPos(now), lib = libration(now);
  var ev = nextEvents(now, age), cal = monthlyCalendar(now);
  var temp = surfTemp(il * 100);
  var vel = Math.round(2 * Math.PI * dist / (SYN * 86400) * 100) / 100;
  var ang = Math.round(2 * 1737.4 / dist * 180 / Math.PI * 60 * 100) / 100;

  // Update SVG
  renderSVG(phase, il, Math.round(300 * window._moonScale));
  updatePhaseLabel(age, il);

  // Show Meeus data immediately
  var rows = buildDataRows(age, il, dist, vel, ang, pos, lib, temp, null, null, ev, null);
  renderDataGrid(rows);
  renderCalendar(cal, now.getDate());

  // Load NASA photo directly (fast, no CORS)
  var directUrl = computeNASAUrl(now);
  if (directUrl) {
    try { await loadNASAImage(directUrl, Math.round(300 * window._moonScale)); } catch (e) {}
  }

  // NASA API for telemetry in background
  var nasa = null;
  try { nasa = await fetchNASADialAMoon(now); } catch (e) {}

  // Update with NASA data if available
  if (nasa) {
    var updatedRows = buildDataRows(age, il, dist, vel, ang, pos, lib, temp, null, null, ev, nasa);
    renderDataGrid(updatedRows);
    window._currentNasa = nasa;
  }

  window._currentPhase = phase;
  window._currentIllum = il;
}

// ═══════════════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════════════
init();
</script>
